<!doctype html>
<html lang="th">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>STC 365 Staking</title>
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.2/dist/ethers.umd.min.js"></script>
<script src="config.js"></script>
</head>
<body>
<div class="wrap">

<h1>🟡 STC 365 Days Staking</h1>

<div class="card">
  <div>Wallet: <span id="wallet">❌ Not connected</span></div>
  <button id="btnConnect">Connect Wallet</button>
  <div id="status">-</div>
</div>

<div class="card">
  <h3>Stake STC</h3>
  <input id="stakeAmt" placeholder="Amount (e.g. 100)" />
  <button id="btnApprove">Approve</button>
  <button id="btnStake">Stake</button>
  <div>Balance: <span id="bal">-</span></div>
</div>

<div class="card">
  <h3>Your Positions</h3>
  <table>
    <thead>
      <tr>
        <th>ID</th>
        <th>Principal</th>
        <th>Start</th>
        <th>Unlock</th>
        <th>Countdown</th>
        <th>Accrued</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="posBody"></tbody>
  </table>
</div>

</div>
<script src="app.js"></script>
</body>
</html>
